<!DOCTYPE html>
<html>
<head>
  <title>Billing Page</title>

  <!-- Include Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #fff8e1;
    }

    .theme-header {
      background-color: #ffb74d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .btn-action {
      background-color: #007bff;
      color: white;
      border-radius: 25px;
      padding: 10px 20px;
      margin: 5px;
      transition: 0.3s;
    }

    .btn-action:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }

    .btn-plus {
      background-color: #28a745;
      color: white;
      border-radius: 25px;
      border: none;
      padding: 5px 12px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-plus:hover {
      background-color: #218838;
      transform: scale(1.05);
    }

    .item-list {
      max-width: 500px;
      margin: 0 auto;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      background-color: white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 15px;
    }

    input.form-control {
      width: 60px;
      border-radius: 15px;
      text-align: center;
      margin-right: 10px;
    }

    .page-action-buttons {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 10px;
    }
  </style>
</head>

<body>
<div class="theme-header">Billing Page</div>

<div class="container mt-4">
  <h4 class="text-center">Select Items</h4>

  <!-- Styled Items -->
  <div id="items" class="mt-4 item-list"></div>

  <!-- Navigation Buttons -->
  <div class="page-action-buttons">
    <button class="btn-action" onclick="navigateToInventory()">Go to Inventory</button>
    <button class="btn-action" onclick="generateBill()">Print Bill</button>
  </div>
</div>

<script>
function loadItems() {
  let items = JSON.parse(localStorage.getItem("items")) || [];
  let div = document.getElementById("items");

  div.innerHTML = ""; // Clear the content before rendering

  items.forEach((item, index) => {
    div.innerHTML += `
      <div class="item-row">
        <span>
          ${item.name} <strong>(₹${item.price})</strong>
        </span>
        <div class="d-flex align-items-center">
          <input type="number" min="0" id="qty${index}" class="form-control" placeholder="Qty" value="0" readonly>
          <button class="btn-plus" onclick="incrementQty(${index})">+</button>
        </div>
      </div>
    `;
  });
}

function incrementQty(index) {
  let qtyInput = document.getElementById(`qty${index}`);
  let currentQty = parseInt(qtyInput.value) || 0;
  qtyInput.value = currentQty + 1;
}

function generateBill() {
  let items = JSON.parse(localStorage.getItem("items")) || [];
  let bill = [];

  items.forEach((item, index) => {
    let qty = document.getElementById("qty" + index).value;

    if (qty > 0) {
      bill.push({
        name: item.name,
        price: item.price,
        qty: qty
      });
    }
  });

  localStorage.setItem("bill", JSON.stringify(bill));
  window.location.href = "bill.html";
}

function navigateToInventory() {
  // Redirect to the inventory page
  window.location.href = "inventory.html";
}

loadItems();
</script>

</body>
</html>
