<!DOCTYPE html>
<html>
<head>
  <title>Bill</title>
  <!-- Include Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #fff8e1;
    }

    .theme-header {
      background-color: #ffb74d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .btn-action {
      background-color: #007bff;
      color: white;
      border-radius: 25px;
      padding: 10px 20px;
      margin: 5px;
      transition: 0.3s;
    }

    .btn-action:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }

    .btn-print {
      background-color: #28a745;
      color: white;
      border-radius: 25px;
      padding: 10px 20px;
      margin: 5px;
      transition: 0.3s;
    }

    .btn-print:hover {
      background-color: #218838;
      transform: scale(1.05);
    }

    .card {
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
      border-radius: 20px;
    }
  </style>
</head>

<body>
<div class="theme-header">Bill Receipt</div>

<div class="container mt-4">
  <div class="card p-4" id="billDiv">
    <h4 class="text-center">Invoice</h4>
    <table class="table table-bordered mt-3">
      <thead class="table-light">
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="billTable"></tbody>
    </table>

    <h5 id="total" class="text-end mt-3"></h5>
  </div>

  <!-- Navigation Buttons -->
  <div class="text-center mt-4">
    <button class="btn btn-action" onclick="navigateToBilling()">Go to Billing Page</button>
    <button class="btn btn-print" onclick="window.print()">Print</button>
  </div>
</div>

<script>
function loadBill() {
  let bill = JSON.parse(localStorage.getItem("bill")) || [];
  let table = document.getElementById("billTable");
  let totalAmount = 0;

  bill.forEach(item => {
    let total = item.qty * item.price;
    totalAmount += total;

    table.innerHTML += `
      <tr>
        <td>${item.name}</td>
        <td>${item.qty}</td>
        <td>₹${item.price}</td>
        <td>₹${total}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = "Total: ₹" + totalAmount;
}

function navigateToBilling() {
  // Redirect to the billing page
  window.location.href = "index.html";
}

loadBill();
</script>

</body>
</html>
